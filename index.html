            if (apiRequest.method && apiRequest.method === 'GET') {
                // 对于GET请求，拼接URL
                const urlWithParams = `${apiRequest.url}?${requestData}`;
                requestPromise = fetch(urlWithParams, {
                    method: 'GET',
                    headers: apiRequest.headers()
                }).then(response => {
                    if (response.ok) {
                        successCount++; // 请求成功
                    } else {
                        failureCount++; // 请求失败
                    }
                }).catch(error => {
                    failureCount++; // 请求失败
                    console.error(`GET 请求失败: ${apiRequest.url}`, error);
                });
            } else if (apiRequest.method && apiRequest.method === 'POST_JSON') {
                // 发送POST请求（JSON格式）
                requestPromise = fetch(apiRequest.url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                }).then(response => {
                    if (response.ok) {
                        successCount++; // 请求成功
                    } else {
                        failureCount++; // 请求失败
                    }
                }).catch(error => {
                    failureCount++; // 请求失败
                    console.error(`POST_JSON 请求失败: ${apiRequest.url}`, error);
                });
            } else if (apiRequest.method && apiRequest.method === 'POST_FORM') {
                // 发送POST请求（表单格式）
                const formData = new URLSearchParams();
                for (const key in requestData) {
                    if (requestData.hasOwnProperty(key)) {
                        formData.append(key, requestData[key]);
                    }
                }

                requestPromise = fetch(apiRequest.url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: formData.toString()
                }).then(response => {
                    if (response.ok) {
                        successCount++; // 请求成功
                    } else {
                        failureCount++; // 请求失败
                    }
                }).catch(error => {
                    failureCount++; // 请求失败
                    console.error(`POST_FORM 请求失败: ${apiRequest.url}`, error);
                });
            } else {
                // 默认的POST请求（处理其他未知的POST请求类型）
                requestPromise = fetch(apiRequest.url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                }).then(response => {
                    if (response.ok) {
                        successCount++; // 请求成功
                    } else {
                        failureCount++; // 请求失败
                    }
                }).catch(error => {
                    failureCount++; // 请求失败
                    console.error(`POST 请求失败: ${apiRequest.url}`, error);
                });
            }

            // 将每个请求的Promise加入到数组中
            requestPromises.push(requestPromise);
        });
    }

    // 等待所有请求完成后，显示结果
    Promise.all(requestPromises).finally(() => {
        // 所有请求完成后，弹出统计信息
        var userResponse = confirm(`轰炸完成！\n成功：${successCount} 条\n失败：${failureCount} 条`);
        if (userResponse) {
            // 用户点击了“确定”
        } else {
            // 用户点击了“取消”
        }
    });
}

    </script>
